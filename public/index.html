<!doctype html>
<html>
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, shrink-to-fit=no" />
    <title>inferno</title>
    <link rel="shortcut icon" href="favicon.webp" />
    
    <!-- core scramjet scripts -->
    <script src="/scram/scramjet.all.js"></script>
    <script src="/baremux/index.js"></script>
    <script src="register-sw.js" defer></script>
    
    <link rel="stylesheet" href="index.css" />
    <script src="index.js" defer></script>
</head>
<body>

    <!-- ambient background environments inside a single wrapper container -->
    <div id="ambient-bg">
        <div id="glow-overlay"></div>
        <div id="blob-container">
            <div class="heat-blob blob-one"></div>
            <div class="heat-blob blob-two"></div>
        </div>
        <div id="ember-container"></div>
    </div>

    <!-- browser controls bar -->
    <header class="nav-bar">
        <div class="nav-buttons">
            <button id="home-btn" title="go home">home</button>
            <button id="back-btn" title="go back">back</button>
        </div>
        
        <!-- target destination container where search bar shifts when browsing -->
        <div id="nav-search-dock"></div>
    </header>

    <!-- main viewport window -->
    <main class="viewport-container">
        <!-- inferno landing panel -->
        <div id="landing-screen" class="flex-center header-center">
            <h1 class="glow-text">inferno</h1>
            <div class="desc left-margin">
                <p style="text-align: center; width: 100%;">browse the web</p>
            </div>
            
            <!-- search bar starts out housed directly in the center of the landing panel -->
            <div id="center-search-dock">
                <form id="sj-form" class="search-container">
                    <input id="sj-search-engine" value="https://google.com" type="hidden" />
                    <input id="sj-address" type="text" placeholder="search" autocomplete="off" />
                    <button type="submit" id="go-btn">go</button>
                </form>
            </div>

            <div class="desc left-margin" style="margin-top: 20px;">
                <p id="sj-error"></p>
                <pre id="sj-error-code"></pre>
            </div>
        </div>
        
        <!-- the core proxy viewport using your original id mapping -->
        <iframe id="sj-frame" src="about:blank" class="hidden"></iframe>
    </main>

</body>
</html>
